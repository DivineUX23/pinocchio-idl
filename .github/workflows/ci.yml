name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check


  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets


  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace


  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.89

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build on MSRV
        run: cargo build --workspace

  idl-snapshot:
    name: IDL Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p pinocchio-idl --bin pinocchio-idl

      - name: Regenerate escrow-fixture IDL
        run: |
          ./target/debug/pinocchio-idl generate \
            --manifest-path crates/fixtures/escrow-fixture/Cargo.toml \
            --out crates/fixtures/escrow-fixture/expected/idl.actual.json

      - name: Diff against committed snapshot
        run: |
          diff \
            crates/fixtures/escrow-fixture/expected/idl.json \
            crates/fixtures/escrow-fixture/expected/idl.actual.json \
            || (echo "IDL output has changed. Run the generator locally and commit the updated snapshot." && exit 1)

  macro-expansion:
    name: Macro Expansion Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-expand
        run: cargo install cargo-expand --locked

      - name: Expand escrow-fixture macros
        run: |
          cargo expand --package escrow-fixture --lib 2>/dev/null \
            > crates/fixtures/escrow-fixture/expected/expanded.actual.rs

      - name: Diff against committed snapshot
        run: |
          diff \
            crates/fixtures/escrow-fixture/expected/expanded.rs \
            crates/fixtures/escrow-fixture/expected/expanded.actual.rs \
            || (echo "Macro expansion has changed. Run 'cargo expand --package escrow-fixture --lib > crates/fixtures/escrow-fixture/expected/expanded.rs' locally and commit the updated snapshot." && exit 1)
